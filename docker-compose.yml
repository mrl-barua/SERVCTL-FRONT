# SERVCTL Frontend standalone compose
# Usage: docker compose up -d

name: servctl-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_SERVCTL_MODE: ${VITE_SERVCTL_MODE:-local}
    container_name: servctl-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # Nginx proxies /api and /socket.io to http://backend:3000.
    # Map backend hostname to host machine so this works when backend runs on host.
    extra_hosts:
      - "backend:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
