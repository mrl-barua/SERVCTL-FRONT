name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - develop

jobs:
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
        continue-on-error: true # don't fail if not configured

      - name: Lint
        run: npm run lint
        continue-on-error: true # don't fail if not configured

      - name: Build (verify it compiles)
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_SERVCTL_MODE: local
