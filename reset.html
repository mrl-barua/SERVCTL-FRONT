<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERVCTL Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0d0f14;
            --bg2: #13161e;
            --bg3: #1a1e28;
            --bg4: #222636;
            --border: #2a2f3f;
            --border2: #363c52;
            --text: #e8eaf0;
            --text2: #8b90a8;
            --text3: #555a72;
            --accent: #4f8ef7;
            --accent2: #2d5bb5;
            --green: #3ecf8e;
            --green-bg: #0d2b1f;
            --yellow: #f5a623;
            --red: #f25f5c;
            --red-bg: #2b0d0d;
            --radius: 8px;
            --radius-lg: 12px;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(ellipse 80% 55% at 50% -10%, rgba(79, 142, 247, 0.07) 0%, transparent 70%),
                var(--bg);
        }

        .card {
            width: min(460px, 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg2);
            padding: 22px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.34);
        }

        .wordmark {
            text-align: center;
            margin-bottom: 14px;
            font-family: var(--font-display);
            font-size: 17px;
            letter-spacing: 0.08em;
            font-weight: 800;
        }

        .title {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-size: 18px;
        }

        .body {
            margin: 0 0 12px;
            color: var(--text2);
            font-size: 11px;
            line-height: 1.7;
        }

        .label {
            display: block;
            margin: 10px 0 6px;
            color: var(--text3);
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .input {
            width: 100%;
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            background: var(--bg3);
            color: var(--text);
            font-size: 12px;
            font-family: var(--font-mono);
            padding: 10px 38px 10px 11px;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text3);
            font-size: 14px;
            line-height: 1;
        }

        .toggle:hover {
            color: var(--text2);
        }

        .strength-wrap {
            margin-top: 12px;
        }

        .strength-label {
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .strength-track {
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: var(--bg4);
            overflow: hidden;
        }

        .strength-fill {
            width: 0;
            height: 100%;
            border-radius: 2px;
            background: var(--red);
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-text {
            margin-top: 6px;
            font-size: 10px;
            color: var(--text2);
        }

        .submit {
            margin-top: 14px;
            width: 100%;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        .submit:disabled {
            opacity: 0.75;
            cursor: not-allowed;
        }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit.loading .spinner {
            display: inline-block;
        }

        .error {
            margin-top: 8px;
            font-size: 10px;
            color: var(--red);
            min-height: 14px;
        }

        .expired {
            display: none;
            margin-top: 12px;
            border: 1px solid rgba(242, 95, 92, 0.4);
            background: var(--red-bg);
            border-radius: var(--radius);
            padding: 10px;
            color: var(--red);
            font-size: 10px;
            line-height: 1.7;
        }

        .expired a {
            color: var(--accent);
            text-decoration: none;
        }

        .expired a:hover {
            text-decoration: underline;
        }

        .success-wrap {
            display: none;
            text-align: center;
            padding: 10px 0;
        }

        .success-icon {
            font-size: 36px;
            color: var(--green);
            line-height: 1;
            margin-bottom: 8px;
        }

        .success-title {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--text);
        }

        .success-body {
            margin: 0 0 14px;
            color: var(--text2);
            font-size: 11px;
            line-height: 1.7;
        }

        .go-login {
            display: inline-block;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            padding: 10px 16px;
            text-decoration: none;
        }

        .go-login:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="card">
            <div class="wordmark">SERVCTL</div>

            <div id="resetContent">
                <h2 class="title">Set a new password</h2>
                <p class="body">Choose a strong password for your SERVCTL account.</p>

                <label class="label" for="password">New password</label>
                <div class="input-wrap">
                    <input class="input" id="password" type="password" autocomplete="new-password" />
                    <button id="togglePassword" class="toggle" type="button">👁</button>
                </div>

                <label class="label" for="confirmPassword">Confirm password</label>
                <div class="input-wrap">
                    <input class="input" id="confirmPassword" type="password" autocomplete="new-password" />
                    <button id="toggleConfirmPassword" class="toggle" type="button">👁</button>
                </div>

                <div class="strength-wrap">
                    <div class="strength-label">Password strength indicator:</div>
                    <div class="strength-track">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Weak</div>
                </div>

                <button class="submit" id="submitBtn" type="button" onclick="submitResetPassword()">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="label-text">Update Password &rarr;</span>
                </button>

                <div class="error" id="errorText"></div>

                <div class="expired" id="expiredBox">
                    ✗ This link has expired.<br />
                    <a href="login.html?panel=forgot">Request a new reset link &rarr;</a>
                </div>
            </div>

            <div class="success-wrap" id="successWrap">
                <div class="success-icon">✓</div>
                <h3 class="success-title">Password updated!</h3>
                <p class="success-body">You can now log in with your new password.</p>
                <a class="go-login" href="login.html">&rarr; Go to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.SERVCTL_API_BASE || `${window.location.protocol}//${window.location.hostname}:3000`;
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            window.location.replace('login.html');
        }

        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const submitBtn = document.getElementById('submitBtn');
        const errorText = document.getElementById('errorText');
        const expiredBox = document.getElementById('expiredBox');
        const resetContent = document.getElementById('resetContent');
        const successWrap = document.getElementById('successWrap');

        function evaluateStrength(value) {
            const checks = [
                value.length >= 8,
                /[A-Z]/.test(value),
                /[0-9]/.test(value),
                /[^A-Za-z0-9]/.test(value),
            ];

            const score = checks.filter(Boolean).length;
            const width = (score / 4) * 100;

            strengthFill.style.width = `${width}%`;

            if (score <= 2) {
                strengthFill.style.background = 'var(--red)';
                strengthText.textContent = 'Weak';
                strengthText.style.color = 'var(--red)';
                return;
            }

            if (score === 3) {
                strengthFill.style.background = 'var(--yellow)';
                strengthText.textContent = 'Fair';
                strengthText.style.color = 'var(--yellow)';
                return;
            }

            strengthFill.style.background = 'var(--green)';
            strengthText.textContent = 'Strong';
            strengthText.style.color = 'var(--green)';
        }

        function bindPasswordToggle(buttonId, inputId) {
            const button = document.getElementById(buttonId);
            const input = document.getElementById(inputId);
            let visible = false;

            button.addEventListener('click', () => {
                visible = !visible;
                input.type = visible ? 'text' : 'password';
                button.textContent = visible ? '👁‍🗨' : '👁';
            });
        }

        async function submitResetPassword() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            errorText.textContent = '';
            expiredBox.style.display = 'none';

            if (!password || !confirmPassword) {
                errorText.textContent = '✗ Please fill in both password fields.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.querySelector('.label-text').textContent = 'Updating...';

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, password, confirmPassword }),
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    const message = Array.isArray(data?.message)
                        ? data.message[0]
                        : data?.message || 'Unable to reset password.';

                    if (String(message).toLowerCase().includes('expired') || String(message).toLowerCase().includes('invalid')) {
                        expiredBox.style.display = 'block';
                    }

                    errorText.textContent = `✗ ${message}`;
                    return;
                }

                resetContent.style.display = 'none';
                successWrap.style.display = 'block';
            } catch {
                errorText.textContent = '✗ Network error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.querySelector('.label-text').textContent = 'Update Password →';
            }
        }

        bindPasswordToggle('togglePassword', 'password');
        bindPasswordToggle('toggleConfirmPassword', 'confirmPassword');

        passwordInput.addEventListener('input', (event) => {
            evaluateStrength(event.target.value);
        });

        window.addEventListener('DOMContentLoaded', () => {
            evaluateStrength('');
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 10);
        });
    </script>
</body>

</html>
